name: MegaLinter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Belt + braces: even if repo-level fork-PR approval is bypassed, this job will not
# execute for pull_request events originating from a fork. Combined with the
# repository setting that requires manual approval for all outside collaborators,
# external contributors cannot trigger workflow runs without a maintainer approving them.
permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: MegaLinter
        id: ml
        uses: oxsecurity/megalinter/flavors/javascript@v8
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive MegaLinter reports
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: megalinter-reports
          path: |
            megalinter-reports
            mega-linter.log
          retention-days: 14
